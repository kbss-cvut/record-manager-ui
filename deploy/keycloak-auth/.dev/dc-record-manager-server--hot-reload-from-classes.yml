# Builds record-manager-server from local source with hot-reload via Spring DevTools and Docker Compose watch.
services:
  record-manager-server:
    image: !reset null
    build:
      context: ../../../record-manager
      dockerfile: Dockerfile.dev
    environment:
      spring.devtools.restart.enabled: true
    develop:
      watch:
        - action: sync
          path: ../../../record-manager/target/classes
          target: /record-manager/target/classes
        - action: rebuild
          path: ../../../record-manager/pom.xml
  nginx:
    develop:
      watch:
        - action: sync+restart
          path: ../../../record-manager/pom.xml
          target: /record-manager/pom.xml
